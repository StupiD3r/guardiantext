<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GuardianText – Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="logo">Guardian<span>Text</span></h1>
      <p class="subtitle">Context-aware messaging with intelligent safety filters.</p>

      <div class="tab-switcher">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn"        id="tab-reg"   onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="form-group">
          <label>Username</label>
          <input type="text" class="input" id="login-username" placeholder="your_username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="input" id="login-password" placeholder="••••••" autocomplete="current-password">
        </div>
        <p class="error-msg hidden" id="login-error"></p>
        <button class="btn btn-primary w-full" style="margin-top:.5rem" onclick="doLogin()">Sign In →</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" class="input" id="reg-username" placeholder="choose_a_username" autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="input" id="reg-password" placeholder="at least 6 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" class="input" id="reg-confirm" placeholder="repeat password" autocomplete="new-password">
        </div>
        <p class="error-msg hidden" id="reg-error"></p>
        <button class="btn btn-primary w-full" style="margin-top:.5rem" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/auth.js"></script>
</body>
</html>
